name: Build and Deploy PDF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Fontist
        uses: fontist/setup-fontist@v2

      - name: Install fonts
        run: fontist install "IBM Plex Serif" "Source Han Serif SC" "Noto Serif CJK SC" "IBM Plex Mono" --newest -a -h

      - name: Install Source Han Serif SC
        run: |
          curl -L -o SourceHanSerifSC.zip https://github.com/adobe-fonts/source-han-serif/releases/download/2.003R/09_SourceHanSerifSC.zip
          unzip SourceHanSerifSC.zip -d ~/.fontist/fonts

      - name: Set up Typst
        uses: typst-community/setup-typst@v5

      - name: Compile PDF
        run: |
          mkdir -p _site
          typst compile book/book.typ _site/ygo-new-master-rule.pdf --font-path ~/.fontist/fonts

      - name: Create Pages index
        run: |
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>游戏王新大师规则</title>
              <style>
                html,
                body {
                  width: 100%;
                  height: 100%;
                  margin: 0;
                }

                iframe {
                  width: 100%;
                  height: 100%;
                  border: 0;
                }
              </style>
            </head>
            <body>
              <iframe
                src="ygo-new-master-rule.pdf"
                title="游戏王新大师规则 PDF"
              >
                <a href="ygo-new-master-rule.pdf">打开 PDF</a>
              </iframe>
            </body>
          </html>
          HTML

      - uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./_site
          github_token: ${{ secrets.GITHUB_TOKEN }}
